<!doctype html>
<html>
<body>
<pre id="out">loaded</pre>
<script>
function log(x) {
  document.getElementById("out").textContent += "\n" + x;
}

function dsCall(method, data, cb) {
  if (typeof _dsbridge === "undefined" || typeof _dsbridge.call !== "function") {
    log("_dsbridge not available");
    return;
  }

  const payload = { data: data || {} };

  if (cb) {
    const cbName = "dscb_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
    window[cbName] = function (result) {
      try {
        cb(result);
      } finally {
        try { delete window[cbName]; } catch (e) {}
      }
    };
    payload._dscbstub = cbName;
  }

  try {
    const ret = _dsbridge.call(method, JSON.stringify(payload));
    log("raw return: " + ret);
    return ret;
  } catch (e) {
    log("call error: " + e);
  }
}

log("typeof _dsbridge = " + typeof _dsbridge);
log("typeof _dsbridge.call = " + (typeof _dsbridge !== "undefined" ? typeof _dsbridge.call : "n/a"));

dsCall("getUserAuth", {}, function (res) {
  log("callback fired");
  log("result = " + (typeof res === "string" ? res : JSON.stringify(res)));
});
</script>
</body>
</html>
