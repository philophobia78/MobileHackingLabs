<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>DSBridge Test</title>
</head>
<body>
  <h1>DSBridge Test</h1>
  <pre id="out">page loaded</pre>

 <script>
function out(x) {
  document.body.innerHTML += "<pre>" + x + "</pre>";
}

out("loaded");
out("typeof dsBridge = " + typeof dsBridge);
out("typeof window.dsBridge = " + typeof window.dsBridge);

for (const k in window) {
  if (k.toLowerCase().includes("bridge")) {
    out("bridge-like global: " + k);
  }
}
</script>
</body>
</html>
