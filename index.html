<!doctype html>
<html>
<body>
<div>DSBridge test</div>
<script>
function log(x) {
  document.body.innerHTML += "<pre>" + x + "</pre>";
}

log("loaded");
log("typeof _dsbridge = " + typeof _dsbridge);

if (typeof _dsbridge === "undefined") {
  log("_dsbridge missing");
} else {
  log("keys: " + Object.keys(_dsbridge).join(", "));
  log("typeof _dsbridge.call = " + typeof _dsbridge.call);

  try {
    log("trying getUserAuth...");
    _dsbridge.call("getUserAuth", "{}", function (res) {
      log("callback from getUserAuth");
      log("res = " + (typeof res === "string" ? res : JSON.stringify(res)));
    });
  } catch (e) {
    log("getUserAuth failed: " + e);
  }

  try {
    log("trying JSApi.getUserAuth...");
    _dsbridge.call("JSApi.getUserAuth", "{}", function (res) {
      log("callback from JSApi.getUserAuth");
      log("res = " + (typeof res === "string" ? res : JSON.stringify(res)));
    });
  } catch (e) {
    log("JSApi.getUserAuth failed: " + e);
  }
}
</script>
</body>
</html>
